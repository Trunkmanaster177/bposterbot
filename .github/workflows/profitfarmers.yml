name: ProfitFarmers Signal Bot

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-pf-bot:
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install chromium --with-deps

      - name: Run ProfitFarmers Bot
        env:
          BINANCE_COOKIES: ${{ secrets.BINANCE_COOKIES }}
        run: python profitfarmers/main_pf.py

      - name: Save state
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -f pf_last_id.txt 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: update pf state [skip ci]"
          git push || true

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pf-debug
          path: "*.png"
          if-no-files-found: ignore
